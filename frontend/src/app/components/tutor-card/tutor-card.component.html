<div class="tutor-card">
  <div class="card-header">
    <div class="avatar-container">
      <img [src]="tutor.image" alt="avatar" />
    </div>
    <div class="subject-badge">{{ tutor.subject }}</div>
  </div>

  <h3 class="tutor-name">{{ tutor.name }}</h3>
  <p class="tutor-bio">{{ tutor.bio }}</p>

  <div class="card-footer">
    <div class="stats">
      <div class="rating">
        <ion-icon name="star"></ion-icon>
        <strong>{{ tutor.rating }}</strong>
        <span class="reviews">({{ tutor.reviews }})</span>
      </div>
      <div class="price">
        <strong>€{{ tutor.price }}</strong
        >/ora
      </div>
    </div>
    <button class="view-btn">Vedi Profilo</button>
  </div>
</div>
