<ion-content class="auth-content">
  <div class="responsive-container">
    <div class="auth-card">
      <div class="brand-header">
        <h1 class="brand-title">SkillUp</h1>
        <p class="brand-subtitle">
          Recupera l'accesso al tuo account
        </p>
      </div>

      <div class="form-container">
        <div class="custom-input-box" [class.input-error]="erroreEmail">
          <ion-icon name="mail-outline" class="input-icon"></ion-icon>
          <ion-input
            type="email"
            mode="ios"
            placeholder="E-mail"
            [(ngModel)]="email"
            [disabled]="otpInviato"
            (ionInput)="resettaMessaggi()"
          ></ion-input>
        </div>

        @if (!otpInviato) {
        <ion-button
          expand="block"
          class="main-auth-btn"
          [disabled]="isLoading"
          (click)="inviaOtp()"
        >
          Invia codice OTP
          <ion-icon slot="end" name="arrow-forward-outline"></ion-icon>
        </ion-button>
        } @else {
        <div class="custom-input-box" [class.input-error]="erroreOtp">
          <ion-icon name="key-outline" class="input-icon"></ion-icon>
          <ion-input
            type="text"
            mode="ios"
            inputmode="numeric"
            maxlength="6"
            placeholder="Codice OTP"
            [(ngModel)]="otp"
            (ionInput)="resettaMessaggi()"
          ></ion-input>
        </div>

        <ion-button
          expand="block"
          class="main-auth-btn"
          [disabled]="isLoading"
          (click)="verificaOtp()"
        >
          Verifica codice
          <ion-icon slot="end" name="arrow-forward-outline"></ion-icon>
        </ion-button>
        }

        @if (messaggioErrore) {
        <div class="error-message-container">
          <ion-icon name="alert-circle-outline"></ion-icon>
          <span>{{ messaggioErrore }}</span>
        </div>
        }

        @if (messaggioSuccesso) {
        <div class="success-message-container">
          <ion-icon name="key-outline"></ion-icon>
          <span>{{ messaggioSuccesso }}</span>
        </div>
        }
      </div>

      <div class="auth-footer">
        <a class="secondary-link" (click)="vaiAlLogin()">
          <ion-icon name="arrow-back-outline"></ion-icon>
          Torna al login
        </a>
      </div>
    </div>
  </div>
</ion-content>
