<ion-content class="search-page-content">
  <div class="page-container">
    <ion-grid>
      <ion-row>
        <ion-col size="12" size-md="5" size-lg="4">
          <div class="filters-panel">
            <div class="filters-header">
              <h2>Filtri</h2>
              <button class="clear-btn">Cancella Tutto</button>
            </div>

            <div class="filter-group">
              <label>Materia</label>
              <div class="search-input-box">
                <ion-icon name="search-outline"></ion-icon>
                <input type="text" placeholder="Es. Matematica" />
              </div>
            </div>

            <div class="filter-group">
              <label>Tariffa Oraria</label>
              <ion-range
                [dualKnobs]="true"
                min="10"
                max="100"
                [value]="{lower: 10, upper: 65}"
                color="dark"
              ></ion-range>
              <div class="range-labels">
                <span>€10</span>
                <span>€65</span>
              </div>
            </div>

            <div class="filter-group">
              <label>Disponibilità</label>
              <div class="checkbox-group">
                <label class="checkbox-container">
                  <input type="checkbox" /> Giorni feriali
                </label>
                <label class="checkbox-container">
                  <input type="checkbox" checked /> Fine settimana
                </label>
                <label class="checkbox-container">
                  <input type="checkbox" /> Sere
                </label>
              </div>
            </div>

            <button class="apply-filters-btn">Applica Filtri</button>
          </div>
        </ion-col>

        <ion-col size="12" size-md="7" size-lg="8" class="main-content-col">
          <div class="header-section">
            <h1>Trova il tutor perfetto per te</h1>

            <div class="main-search-bar">
              <ion-icon name="search-outline"></ion-icon>
              <input
                type="text"
                placeholder="Cerca per nome, materia o parola chiave..."
              />
              <button class="search-btn">Cerca</button>
            </div>
          </div>

          <ion-grid class="ion-no-padding">
            <ion-row>
              @for (tutor of tutors; track tutor.name) {
              <ion-col
                size="12"
                size-sm="6"
                size-xl="4"
                class="ion-padding-bottom ion-padding-end"
              >
                <app-tutor-card [tutor]="tutor"></app-tutor-card>
              </ion-col>
              }
            </ion-row>
          </ion-grid>
        </ion-col>
      </ion-row>
    </ion-grid>
  </div>
</ion-content>
